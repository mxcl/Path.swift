name: CI
on:
  pull_request:
  schedule:
    - cron: '3 3 * * 5'  # 3:03 AM, every Friday

concurrency:
  group: ${{ github.head_ref || 'push' }}
  cancel-in-progress: true

jobs:
  verify-linuxmain:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
    - run: swift test --generate-linuxmain
    - run: git diff --exit-code

  apple:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-13
          - macos-14
        platform:
          - iOS
          - tvOS
          - macOS
          - watchOS
    steps:
    - uses: actions/checkout@v4
    - uses: mxcl/xcodebuild@v1
      with:
        platform: ${{ matrix.platform }}
        code-coverage: true
        warnings-as-errors: true
    - uses: codecov/codecov-action@v1

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
        - swift:5.3
        - swift:5.4
        - swift:5.5
        - swift:5.6
        - swift:5.7
        - swift:5.8
        - swift:5.9
        - swift:5.10
    container:
      image: ${{ matrix.swift }}
    steps:
    - uses: actions/checkout@v4

    - run: useradd -ms /bin/bash mxcl
    - run: chown -R mxcl .
    # ^^ we need to be a normal user and not root for the tests to be valid

    - name: Get Swift Version
      id: swift
      run: |
        version=$(swift --version | head -n1 | sed 's/.*Swift version \([0-9.]*\).*/\1/')
        marketing_version=$(echo $version | cut -d. -f1)
        echo "marketing-version=$marketing_version" >> $GITHUB_OUTPUT
        echo "Swift version: $version (marketing: $marketing_version)"

    - run: echo ARGS=--enable-code-coverage >> $GITHUB_ENV
      if: ${{ steps.swift.outputs.marketing-version > 5 }}

    - run: su mxcl -c "swift test --parallel $ARGS"

    - name: Generate `.lcov`
      if: ${{ steps.swift.outputs.marketing-version > 5 }}
      run: |
        apt-get -qq update && apt-get -qq install curl
        b=$(swift build --show-bin-path)
        llvm-cov export \
          -format lcov \
          -instr-profile="$b"/codecov/default.profdata \
          --ignore-filename-regex='\.build|Tests' \
          "$b"/*.xctest \
          > info.lcov

    - uses: codecov/codecov-action@v1
      if: ${{ steps.swift.outputs.marketing-version > 5 }}
      with:
        file: ./info.lcov
  
  linux-legacy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
        - swift:4.2
        - swift:5.0
        - swift:5.1
        - swift:5.2
    container:
      image: ${{ matrix.swift }}
    steps:
    - uses: actions/checkout@v3
      # Using v3 instead of v4 because v4 requires node20 which needs glibc 2.28+
      # These old Swift containers (Ubuntu 18.04) only have glibc 2.27

    - run: useradd -ms /bin/bash mxcl
    - run: chown -R mxcl .
    # ^^ we need to be a normal user and not root for the tests to be valid

    - run: su mxcl -c "swift test --parallel"
